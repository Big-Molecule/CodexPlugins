name: Validate Codex marketplace

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate marketplace and plugins
        run: python scripts/validate_repository.py

      - name: Test Niu Image Gen
        run: node --test plugins/niu-image-gen/tests/generate.test.mjs
